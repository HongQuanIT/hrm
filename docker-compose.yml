services:
  app:
    build:
      context: .
    container_name: hrm_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - hrm

  nginx:
    image: nginx:1.27-alpine
    container_name: hrm_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hrm

  mysql:
    image: mysql:8.4
    container_name: hrm_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hrm
      MYSQL_USER: hrm
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrm

networks:
  hrm:
    driver: bridge

volumes:
  bootstrap_cache:
  mysql_data:
