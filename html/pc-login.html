<style>
        body {

            background-color: #faf8ff;
        }

            background: rgba(255, 255, 255, 0.8);

<body class="min-h-screen flex items-center justify-center p-md relative overflow-hidden">
<!-- Atmospheric Background Decoration -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[40rem] h-[40rem] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[35rem] h-[35rem] bg-secondary-container/10 rounded-full blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[480px] z-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="glass-morphism rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-xl flex flex-col gap-lg">
<!-- Brand & Heading -->
<div class="text-center space-y-xs">
<div class="inline-flex items-center justify-center w-14 h-14 bg-primary-container rounded-xl mb-md shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-white text-[32px]">hub</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight">Chào mừng trở lại</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Vui lòng nhập thông tin để truy cập PeoplePulse HRM</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md" id="loginForm">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email công việc</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-[48px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant transition-all input-focus-ring" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Mật khẩu</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-[48px] pr-[48px] py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant transition-all input-focus-ring" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-xs py-base">
<input class="w-5 h-5 rounded border-outline-variant text-primary-container focus:ring-primary-container/20 transition-all cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Ghi nhớ đăng nhập</label>
</div>
<!-- Submit Button -->
<button class="w-full mt-sm py-sm px-lg bg-primary-container text-white font-headline-md text-headline-md rounded-lg shadow-lg shadow-primary-container/25 hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-xs" type="submit">
<span>Đăng nhập</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Social/SSO Divider -->
<div class="relative my-sm">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant/50"></span>
</div>
<div class="relative flex justify-center text-label-md uppercase">
<span class="bg-white/0 px-md text-outline font-medium tracking-wider">Hoặc đăng nhập với</span>

</div>
<!-- SSO Options -->

<span>Google</span>
</button>
<button class="flex items-center justify-center gap-xs py-sm border border-outline-variant rounded-lg font-body-md text-on-surface-variant hover:bg-surface-container-low transition-all">
<img class="w-5 h-5" data-alt="Microsoft Office 365 icon logo featuring its distinctive blue square-based aesthetic, presented with soft shading for a premium modern corporate SaaS identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD114HaN1Q4SPFe8lll8i8WxoX-ZIpyYaKo8EGuGNouwNvRIaPUrFWwd20L1aQkU54KDS3VkkdxYNzDMVA3GuthywRxg-qbENT4X1u2bfOvO365g_YbkmT3yHu5oxJ1Cpmi2Fz59wumWteiBtFBEL89MD9u2BMUuafIbaokPL2Rm2xLzWLNCWO2-SJZdw4OxdXIgVNFjirUxR1aCBW4Og7pp-m7D9d0_aoFEAwhAtXG-Wp6H44qqCZJx6m0r0eNp-TH8uPmbjvJXCY"/>
<span>Office 365</span>
</button>
</div>
</div>

<footer class="mt-xl text-center space-y-xs">
<p class="font-body-md text-body-md text-outline">
                Bạn chưa có tài khoản? <a class="text-primary font-semibold hover:underline" href="#">Liên hệ Admin</a>
</p>
<p class="font-label-md text-label-md text-outline/60 mt-lg">
                © 2024 PeoplePulse HRM. Bản quyền thuộc về Enterprise Solutions Inc.
            </p>
</footer>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Simple loading state simulation
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> <span>Đang xử lý...</span>';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>Thành công!</span>';
                btn.classList.replace('bg-primary-container', 'bg-tertiary-container');
                
                setTimeout(() => {
                    // Reset or Redirect logic
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-tertiary-container', 'bg-primary-container');
                }, 2000);
            }, 1500);
        });
    </script>
</body></html>
