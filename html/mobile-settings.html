<script>
        // Simple micro-interaction for toggle buttons
        document.querySelectorAll('.bg-outline-variant, .bg-primary').forEach(toggle => {
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                const circle = this.querySelector('div');
                if (this.classList.contains('bg-primary')) {
                    this.classList.replace('bg-primary', 'bg-outline-variant');
                    circle.classList.replace('ml-auto', 'ml-0');
                } else {
                    this.classList.replace('bg-outline-variant', 'bg-primary');
                    circle.classList.replace('ml-0', 'ml-auto');
                }
            });
        });
    </script>
